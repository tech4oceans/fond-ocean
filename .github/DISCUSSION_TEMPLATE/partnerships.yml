title: "[Partner] "
labels:
  - partnership
body:
  - type: markdown
    attributes:
      value: |
        Use this category for public partnership exploration.

        Share only organization-level information. Do not post personal phone numbers, personal email addresses, private documents, or non-public deal terms.
  - type: input
    id: organization
    attributes:
      label: Organization
      description: Public name of the organization
      placeholder: Example University, Museum of Marine Science, Ocean Data Lab
    validations:
      required: true
  - type: input
    id: public-link
    attributes:
      label: Public website or profile
      description: A public URL for the organization or initiative
      placeholder: https://example.org
    validations:
      required: true
  - type: dropdown
    id: partner-type
    attributes:
      label: Organization type
      options:
        - University
        - Research center
        - Museum or exhibition venue
        - Nonprofit or foundation
        - Conference or event
        - Open-source community
        - Public institution
        - Other
    validations:
      required: true
  - type: textarea
    id: relevance
    attributes:
      label: Why this partner is relevant
      description: What is the strategic fit for Ocean Fund?
    validations:
      required: true
  - type: textarea
    id: format
    attributes:
      label: Possible collaboration format
      description: Describe one realistic format such as lecture, research brief, workshop, dataset review, exhibition, or joint event.
    validations:
      required: true
  - type: textarea
    id: public-outcome
    attributes:
      label: Expected public outcome
      description: What public-facing result could come from this collaboration?
      placeholder: Open lecture, partner brief, dataset review, page, showcase, notebook, exhibit text, or event session.
  - type: checkboxes
    attributes:
      label: Safety check
      options:
        - label: I confirm this discussion contains only public information and no personal contact details or confidential terms.
          required: true
